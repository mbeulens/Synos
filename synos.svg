<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Green circle background -->
  <circle cx="64" cy="64" r="62" fill="#22c55e"/>

  <!-- Left speaker body -->
  <rect x="18" y="32" width="34" height="64" rx="5" fill="#1a1a1a"/>
  <!-- Woofer -->
  <circle cx="35" cy="68" r="12" fill="#2a2a2a" stroke="#555" stroke-width="1.5"/>
  <circle cx="35" cy="68" r="7" fill="#333"/>
  <circle cx="35" cy="68" r="2.5" fill="#666"/>
  <!-- Tweeter -->
  <circle cx="35" cy="46" r="6" fill="#2a2a2a" stroke="#555" stroke-width="1.5"/>
  <circle cx="35" cy="46" r="2.5" fill="#555"/>

  <!-- Right speaker body -->
  <rect x="76" y="32" width="34" height="64" rx="5" fill="#1a1a1a"/>
  <!-- Woofer -->
  <circle cx="93" cy="68" r="12" fill="#2a2a2a" stroke="#555" stroke-width="1.5"/>
  <circle cx="93" cy="68" r="7" fill="#333"/>
  <circle cx="93" cy="68" r="2.5" fill="#666"/>
  <!-- Tweeter -->
  <circle cx="93" cy="46" r="6" fill="#2a2a2a" stroke="#555" stroke-width="1.5"/>
  <circle cx="93" cy="46" r="2.5" fill="#555"/>

  <!-- Sound waves left (outward) -->
  <path d="M14 52 Q6 64 14 76" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <path d="M8 44 Q-3 64 8 84" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.5"/>

  <!-- Sound waves right (outward) -->
  <path d="M114 52 Q122 64 114 76" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <path d="M120 44 Q131 64 120 84" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.5"/>

  <!-- Center blast lines -->
  <path d="M56 48 L72 48" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <path d="M54 56 L74 56" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  <path d="M53 64 L75 64" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
  <path d="M54 72 L74 72" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  <path d="M56 80 L72 80" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
</svg>
