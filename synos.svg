<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Green gradient circle -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>
  <circle cx="64" cy="64" r="62" fill="url(#bg)"/>

  <!-- Headphones arc -->
  <path d="M32 68 Q32 32 64 28 Q96 32 96 68" fill="none" stroke="#1a1a1a" stroke-width="7" stroke-linecap="round"/>

  <!-- Left ear cup -->
  <rect x="24" y="58" width="16" height="26" rx="6" fill="#1a1a1a"/>
  <rect x="27" y="62" width="10" height="18" rx="4" fill="#2d2d2d"/>

  <!-- Right ear cup -->
  <rect x="88" y="58" width="16" height="26" rx="6" fill="#1a1a1a"/>
  <rect x="91" y="62" width="10" height="18" rx="4" fill="#2d2d2d"/>

  <!-- EQ bars -->
  <rect x="44" y="68" width="5" height="22" rx="2" fill="#fff" opacity="0.95"/>
  <rect x="52" y="58" width="5" height="32" rx="2" fill="#fff" opacity="0.95"/>
  <rect x="60" y="52" width="5" height="38" rx="2" fill="#fff"/>
  <rect x="68" y="62" width="5" height="28" rx="2" fill="#fff" opacity="0.95"/>
  <rect x="76" y="72" width="5" height="18" rx="2" fill="#fff" opacity="0.95"/>

  <!-- Beat dots -->
  <circle cx="47" cy="96" r="2" fill="#fff" opacity="0.5"/>
  <circle cx="55" cy="96" r="2" fill="#fff" opacity="0.7"/>
  <circle cx="63" cy="96" r="2" fill="#fff" opacity="0.9"/>
  <circle cx="71" cy="96" r="2" fill="#fff" opacity="0.7"/>
  <circle cx="79" cy="96" r="2" fill="#fff" opacity="0.5"/>
</svg>
